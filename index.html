<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="theme-color" content="#070b14" />
        <link rel="icon" type="image/x-icon" href="/favicon.ico" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <link
            rel="icon"
            type="image/png"
            sizes="96x96"
            href="/favicon-96x96.png"
        />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="/apple-touch-icon.png"
        />
        <title>ConciseCap | Field Documentation Software for Contractors</title>
    </head>
    <body>
        <div id="root"></div>
        <script>
            (function () {
                var obj = window;
                var fetchDescriptor = Object.getOwnPropertyDescriptor(
                    obj,
                    "fetch",
                );
                if (!fetchDescriptor) {
                    obj = Window.prototype;
                    fetchDescriptor = Object.getOwnPropertyDescriptor(
                        obj,
                        "fetch",
                    );
                }
                if (
                    fetchDescriptor &&
                    fetchDescriptor.get &&
                    !fetchDescriptor.set
                ) {
                    Object.defineProperty(obj, "fetch", {
                        get: fetchDescriptor.get,
                        set: function () {
                            console.warn("Ignoring attempt to overwrite fetch");
                        },
                        configurable: true,
                        enumerable: fetchDescriptor.enumerable,
                    });
                }
            })();
        </script>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
